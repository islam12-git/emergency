<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حقيبة الطوارئ السياحية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Cairo,Arial;
background:linear-gradient(140deg,#0b2545,#134074,#1e6091,#3a86ff);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
padding:20px;
}

/* العنوان */

.title{
font-size:34px;
font-weight:600;
margin-bottom:40px;
text-align:center;
}

/* الحاوية */

.container{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;

/* العربي على اليمين */
flex-direction:row-reverse;
}

/* الكارت */

.card{
width:420px;
max-width:90vw;
min-height:420px;

padding:35px;

background:rgba(255,255,255,0.07);
border-radius:25px;
backdrop-filter:blur(12px);

box-shadow:0 0 30px rgba(0,0,0,0.45);

display:flex;
flex-direction:column;
align-items:center;

text-align:center;

transition:0.3s;
justify-content: space-between; /* النص في المنتصف بين الصورة والزرار */
}

.card:hover{
transform:translateY(-5px);
}

/* الصورة */

.card img{
width:120px;
margin-bottom:20px;
}

/* النص */

.text{
font-size:20px;
line-height:1.9;
flex-grow:1;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:10px 0; /* مسافة داخلية صغيرة لتوسيط النص */
}

/* الزرار */

button{
border:none;
padding:14px 40px;
font-size:18px;
cursor:pointer;
border-radius:50px;
background:#4cc9f0;
color:#002233;
font-weight:600;
transition:0.3s;
font-family:Poppins;
}

button:hover{
background:#72ddff;
}

/* موبايل */

@media (max-width:768px){

.title{
font-size:26px;
margin-bottom:25px;
}

.card{
width:100%;
min-height:420px; /* زيادة شوية ارتفاع الموبايل */
}

.card img{
width:90px;
}

.text{
font-size:18px;
}

button{
font-size:16px;
padding:12px 30px;
}

}

</style>

</head>

<body>

<div class="title">
حقيبة الطوارئ السياحية
</div>

<div class="container">

<!-- Arabic (الأول وعلى اليمين) -->
<div class="card">

<img src="image/1.png">

<div class="text">
 لا تخف ولا تقلق <br>
فأنت في أكثر الأراضي أمانًا<br><br>
أرض مصر
</div>

<button onclick="window.location.href='home/home_ar.html'">
    الدخول بالعربية
</button>

</div>

<!-- English -->
<div class="card">

<img src="image/1.png">

<div class="text" style="font-family:Poppins;">
Do not be afraid or worried ,<br>
for you are in the safest land<br><br>
the land of Egypt
</div>

<button onclick="window.location.href='home/home_en.html'">
    Enter in English
</button>

</div>

</div>


</body>
</html>
