<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Main Page</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Cairo,Arial;
    background:linear-gradient(140deg,#0b2545,#134074,#1e6091,#3a86ff);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    color:white;
    padding:20px;
}

/* Title */
.title{
    font-size:34px;
    font-weight:600;
    margin:30px 0;
    text-align:center;
}

/* Container */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
    width:100%;
    max-width:1200px;
    justify-items:center;
}

/* Card */
.card{
    width:100%;
    max-width:360px;
    min-height:250px;
    background:rgba(255,255,255,0.07);
    border-radius:25px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 30px rgba(0,0,0,0.45);
    display:flex;
    flex-direction:column; /* Image on top */
    align-items:center;
    justify-content:flex-start;
    text-align:center;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    padding:20px;
    gap:15px;
}

.card:hover{
    transform:translateY(-5px) scale(1.03);
    background:rgba(255,255,255,0.12);
}

/* Image */
.card img{
    width:350px;      /* Fixed image size */
    height:350px;
    object-fit:cover;
    border-radius:15px;
}

/* Text */
.card-text{
    flex-grow:1;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    margin-top:10px;
}

/* Mobile */
@media (max-width:768px){
    .title{
        font-size:26px;
        margin-bottom:20px;
    }
    .card{
        min-height:220px;
    }
    .card img{
        width:100px;
        height:100px;
    }
    .card-text{
        font-size:16px;
    }
}
</style>
</head>

<body>

<div class="title">Emergency Main Page</div>

<div class="container">

<div class="card" onclick="window.location.href='../hospital/hospital_en.html'">
    <img src="../image/hospital.jpg" alt="Hospital Image">
    <div class="card-text">Hospitals and Critical Departments Contact Info</div>
</div>

<div class="card" onclick="window.location.href='../embassy/embassy_en.html'">
    <img src="../image/embassy.jpg" alt="Embassy Image">
    <div class="card-text">Embassies Contact Information</div>
</div>

<div class="card" onclick="window.location.href='../emergency/emergency_en.html'">
    <img src="../image/emergency.jpg" alt="Emergency Image">
    <div class="card-text">Emergency Procedures During Crises</div>
</div>

</div>

</body>
</html>
